<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>わたしのサイト</title>

  <style>

    * {
      box-sizing: border-box;
    }

    body {
      margin: 20px;
      background: linear-gradient(135deg, #fdeeff, #e0f7ff);
      font-family: "Helvetica Neue", sans-serif;
      color: #59240c;
    }

    .card {
      background: linear-gradient(180deg, #ffffff, #f9f9ff);
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 500px;
      margin: 0 auto 20px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 30px rgba(0,0,0,0.2);
    }

    .card:nth-of-type(1) { animation-delay: 0.2s; }
    .card:nth-of-type(2) { animation-delay: 0.4s; }
    .card:nth-of-type(3) { animation-delay: 0.6s; }
    .card:nth-of-type(4) { animation-delay: 0.8s; }
    .card:nth-of-type(5) { animation-delay: 1s; } 

    ul {
      list-style-type: none;
      background: linear-gradient(135deg, #bbefff, #c6d3ff);
      padding: 15px;
      border-radius: 10px;
    }

    li::before {
      content: "💙 ";
    }

    li {
      transition: 0.3s;
      margin: 8px 0;
    }

    li:hover {
      transform: scale(1.1);
      color: #ff4da6;
    }
    
    li:hover::before {
      content: "💖 ";
    }

    .fade-in {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeIn 1s forwards;
    }

    @keyframes fadeIn {
      to {
       opacity: 1;
       transform: translateY(0);
      }
    }

    h1 {
      text-align: center;
      color: #cb0066;
    }

    h2 {
      color: #787fff;
      border-bottom: 2px dashed #1c4c95;
      padding-bottom: 5px;
    }
  </style>
</head>

<body>
  <body ontouchstart="">
  <h1>Welcome!</h1>
  <p>わたしの“だ～いすき♥”をたくさん詰め込みました♪</p>

  <div class="card fade-in">
    <h2>About me</h2>
    <p>ディズニーと推しに青春ささげてます</p>
    <p>大学1年次　TDR 31回</p>
    <p>大学2年次　IFT 73回</p>
    <p>大学3年次　推しの現場 60回</p>
  </div>

  <div class="card fade-in"> 
    <h2>好きなもの</h2>
    <ul>
     <li>ディズニー</li>
     <li>音楽</li>
     <li>映画</li>
     <li>推しの現場</li>
    </ul>
  </div>

  <div class="card fade-in">
    <h2>movies</h2>
    <ul>
      <li>塔の上のラプンツェル</li>
      <li>ズートピア</li>
    </ul>
  </div>

  <div class="card fade-in">
    <h2>musics</h2>
    <ul>
      <li>I see the light</li>
      <li>zoo</li>
    </ul>
  </div>

  <div class="card fade-in">
    <h2>show/parade</h2>
    <ul>
      <li>CWJ</li>
      <li>ナブル</li>
    </ul>
  </div>

</body>
</html>

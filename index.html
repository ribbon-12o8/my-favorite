<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>わたしのサイト</title>

  <style>
    body {
     background: linear-gradient(135deg, #fdeeff, #e0f7ff);
     font-family: "Helvetica Neue", sans-serif;
      color: #59240c;
      margin: 40px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }

    ul {
      list-style-type: none;
    }

    li::before {
      content: "💙 ";
    }

    li {
      transition: 0.3s;
    }

    li:hover {
      transform: scale(1.1);
      color: #ff4da6;
    }
    
    li:hover::before {
      content: "💖 ";
    }

    .fade-in {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeIn 1s forwards;
    }

    @keyframes fadeIn {
      to {
       opacity: 1;
       transform: translateY(0);
      }
    }

    h1 {
      color: #cb0066;
    }

    h2 {
      color: #787fff;
      border-bottom: 2px dashed #1c4c95;
      padding-bottom: 5px;
    }

    ul {
      background-color: rgb(181, 226, 255);
      padding: 15px;
      border-radius: 10px;
    }
  </style>
</head>

<body>
  <h1>Welcome!</h1>
  <p>わたしの“だ～いすき♥”をたくさん詰め込みました♪</p>

  <div class="card">
    <h2>About me</h2>
    <p>ディズニーと推しに青春ささげてます</p>
    <p>大学1年次　TDR 31回</p>
    <p>大学2年次　IFT 73回</p>
    <p>大学3年次　推しの現場 60回</p>
  </div>

  <div class="card"> 
    <h2>好きなもの</h2>
    <ul>
     <li>ディズニー</li>
     <li>音楽</li>
     <li>映画</li>
     <li>推しの現場</li>
    </ul>
  </div>

  <h2>movies</h2>
  <ul>
    <li>塔の上のラプンツェル</li>
    <li>ズートピア</li>
  </ul>

  <h2>musics</h2>
  <ul>
    <li>I see the light</li>
    <li>zoo</li>
  </ul>

  <h2>show/parade</h2>
  <ul>
    <li>CWJ</li>
    <li>ナブル</li>
  </ul>
</body>
</html>
